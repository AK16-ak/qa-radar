# QA Radar — SDET / Automation Testing jobs in India + Remote.
# Edit freely — no code changes needed.

# ----------------------------------------------------------------------------
# WATCHLIST: companies whose careers pages (via their ATS) you want to monitor.
# ----------------------------------------------------------------------------
watchlist:
  greenhouse:
    - postman           # API testing leader, India/global
    - phonepe           # India fintech
    - groww             # India fintech
    - druva             # India/global
    - netskope          # India/global
    - rubrik
    - atlassian         # Strong QA culture
    - stripe
    - databricks
    - coinbase
    - pinterest
    - gitlab
    - elastic
    - mongodb
    - cloudflare
    - twilio
    - datadog
    - samsara
    - discord
    - airtable
    - figma
    - reddit
    - instacart
    - roblox
    - gusto
  lever:
    - cred              # India fintech
    - meesho            # India e-commerce
    - epifi             # India (Fi Money)
    - zeta              # India fintech
    - browserstack      # Testing platform, India
  ashby:
    - sarvam            # India (Sarvam AI)
    - perplexity
    - linear
    - vercel
    - openai
    - notion
    - cursor            # Anysphere
    - ramp
    - cohere
    - watershed
    - sierra
  smartrecruiters:
    - Wise
    - Visa
    - SAP

# ----------------------------------------------------------------------------
# DISCOVERY: broad search across free job APIs (beyond your watchlist).
# Adzuna needs free keys (ADZUNA_APP_ID / ADZUNA_APP_KEY as GitHub Secrets);
# if not set, Adzuna is skipped automatically.
# ----------------------------------------------------------------------------
discovery:
  enabled: true
  queries:
    - "sdet india"
    - "test automation engineer india"
    - "automation tester india"
    - "sdet"
    - "test automation engineer"
  remotive_search: "sdet"
  remoteok: true
  arbeitnow: true
  jobicy_tags:
    - automation
    - testing
  himalayas: true
  himalayas_limit: 50
  themuse:
    enabled: true
    pages: 3
    categories:
      - "Software Engineering"
    locations:
      - "Bengaluru, India"

# ----------------------------------------------------------------------------
# FILTERS — title must match an include keyword AND location must be in
# allowed Indian cities or Remote. Word-boundary aware ("sdet" != "sdetail").
# ----------------------------------------------------------------------------
include_keywords:
  - sdet
  - test automation
  - test automation engineer
  - automation engineer
  - automation tester
  - automation testing
  - selenium
  - cypress
  - playwright
  - appium
  - software development engineer in test

exclude_keywords:
  - senior staff
  - staff
  - principal
  - architect
  - lead
  - manager
  - director
  - head of
  - vp
  - vice president
  - founding
  - intern
  - internship
  - trainee
  - apprentice
  - frontend developer
  - backend developer
  - fullstack developer
  - data scientist
  - data analyst
  - machine learning
  - ml engineer
  - support engineer
  - sales
  - recruiter
  - designer
  - product manager
  - devops engineer
  - sre
  - site reliability
  - network engineer
  - hardware

# Allowed locations — jobs MUST be in one of these cities or Remote.
# The filter also accepts any location containing "india".
allowed_locations:
  - gurugram
  - gurgaon
  - pune
  - hyderabad
  - bengaluru
  - bangalore
  - delhi
  - new delhi
  - noida
  - mumbai
  - remote

# Strict mode ON — only allowed locations pass. Jobs in other cities are dropped.
strict_location: true
